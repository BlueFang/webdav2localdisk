name: Build (Windows)

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-2022

    steps:
      - uses: actions/checkout@v4

      - name: Download & unpack Qt 6.8.3 MSVC 2022
        shell: pwsh
        run: |
          $base = "https://download.qt.io/online/qtsdkrepository/windows_x86/desktop/qt6_683/qt6_683/qt.qt6.683.win64_msvc2022_64"
          $dl = "$env:RUNNER_TEMP\qt_pkgs"
          mkdir $dl -Force

          $pkgs = @(
            "6.8.3-0-202503201308qtbase-Windows-Windows_11_23H2-MSVC2022-Windows-Windows_11_23H2-X86_64.7z",
            "6.8.3-0-202503201308qttools-Windows-Windows_11_23H2-MSVC2022-Windows-Windows_11_23H2-X86_64.7z"
          )
          foreach ($p in $pkgs) {
            $url = "$base/$p"
            Write-Host "Downloading $url"
            Invoke-WebRequest -Uri $url -OutFile "$dl\$p" -ErrorAction Stop
          }

          Write-Host "Extracting to C:\Qt\6.8.3\msvc2022_64"
          mkdir C:\Qt\6.8.3\msvc2022_64 -Force
          foreach ($p in $pkgs) {
            & "$env:ProgramFiles\7-Zip\7z.exe" x "$dl\$p" -oC:\Qt\6.8.3\msvc2022_64 -y -bso0
          }
          Write-Host "Qt unpacked OK"

      - name: Find Qt
        shell: pwsh
        run: |
          $qtRoot = "C:\Qt\6.8.3\msvc2022_64"
          if (!(Test-Path "$qtRoot\bin\qmake.exe")) {
            $qmake = Get-ChildItem -Path C:\Qt -Recurse -Filter qmake.exe -ErrorAction SilentlyContinue | Select-Object -First 1
            if (-not $qmake) { Write-Error "Qt not found!"; exit 1 }
            $qtRoot = $qmake.Directory.FullName
          }
          Write-Host "QT_ROOT=$qtRoot"
          echo "QT_ROOT=$qtRoot" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Install WinFsp
        shell: pwsh
        run: |
          Invoke-WebRequest -Uri "https://github.com/winfsp/winfsp/releases/download/v2.1/winfsp-2.1.24255.msi" -OutFile winfsp.msi
          msiexec /i winfsp.msi /qn /norestart
          Start-Sleep -Seconds 8
          if (!(Test-Path "C:\Program Files (x86)\WinFsp\lib\winfsp-x64.lib")) {
            Write-Error "WinFsp lib not found"
          }

      - name: Configure
        shell: pwsh
        run: |
          cmake -B build -S . `
            -DCMAKE_BUILD_TYPE=Release `
            "-DCMAKE_PREFIX_PATH=$env:QT_ROOT" `
            "-DWINFSP_ROOT=C:/Program Files (x86)/WinFsp"

      - name: Build
        shell: pwsh
        run: cmake --build build --config Release --parallel

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: webdav2localdisk-x64-Release
          path: |
            build/Release/webdav2localdisk.exe
            build/Release/*.dll
          if-no-files-found: error
