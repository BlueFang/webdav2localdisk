name: Build (Windows)

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-2022

    steps:
      - uses: actions/checkout@v4

      - name: Install Qt 6 (aqt)
        shell: pwsh
        run: |
          pip install aqtinstall
          aqt install-qt windows desktop 6.8.3 win64_msvc2022_64 `
            --modules qtbase qttools `
            --outputdir C:\Qt
          Write-Host "--- Qt install done ---"
          dir C:\Qt -Recurse -Filter qmake.exe 2>$null | Select-Object -First 3

      - name: Find Qt
        shell: pwsh
        run: |
          $qmake = Get-ChildItem -Path C:\Qt -Recurse -Filter qmake.exe -ErrorAction SilentlyContinue | Select-Object -First 1
          if (-not $qmake) { Write-Error "Qt qmake not found!"; exit 1 }
          $qtRoot = $qmake.Directory.FullName
          Write-Host "QT_ROOT=$qtRoot"
          echo "QT_ROOT=$qtRoot" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Install WinFsp
        shell: pwsh
        run: |
          Invoke-WebRequest -Uri "https://github.com/winfsp/winfsp/releases/download/v2.1/winfsp-2.1.24255.msi" -OutFile winfsp.msi
          msiexec /i winfsp.msi /qn /norestart
          Start-Sleep -Seconds 8
          if (Test-Path "C:\Program Files (x86)\WinFsp\lib\winfsp-x64.lib") {
            Write-Host "WinFsp OK"
          } else {
            Write-Error "WinFsp lib not found"
          }

      - name: Configure
        shell: pwsh
        run: |
          cmake -B build -S . `
            -DCMAKE_BUILD_TYPE=Release `
            "-DCMAKE_PREFIX_PATH=$env:QT_ROOT" `
            "-DWINFSP_ROOT=C:/Program Files (x86)/WinFsp"

      - name: Build
        shell: pwsh
        run: cmake --build build --config Release --parallel

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: webdav2localdisk-x64-Release
          path: |
            build/Release/webdav2localdisk.exe
            build/Release/*.dll
          if-no-files-found: error
