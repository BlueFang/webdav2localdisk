name: Build (Windows)

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-2022
    env:
      QT_VER: "6.7.3"
      QT_ARCH: "win64_msvc2022_64"
      QT_DIR: "${{ github.workspace }}/Qt"

    steps:
      - uses: actions/checkout@v4

      - name: Install Qt 6 via aqt
        shell: pwsh
        run: |
          pip install aqtinstall
          aqt install-qt windows desktop $env:QT_VER $env:QT_ARCH `
            --outputdir "$env:QT_DIR"
          echo "Qt installed to: $env:QT_DIR"
          dir "$env:QT_DIR"

      - name: Install WinFsp
        shell: pwsh
        run: |
          Invoke-WebRequest -Uri "https://github.com/winfsp/winfsp/releases/download/v2.1/winfsp-2.1.24255.msi" `
            -OutFile winfsp.msi
          msiexec /i winfsp.msi /qn /norestart
          Start-Sleep -Seconds 5
          dir "C:\Program Files (x86)\WinFsp\lib"

      - name: Configure
        shell: pwsh
        run: |
          $qt_root = (Get-ChildItem "$env:QT_DIR\$env:QT_VER\$env:QT_ARCH" -Directory | Select-Object -First 1).FullName
          if (-not $qt_root) { $qt_root = "$env:QT_DIR\$env:QT_VER\$env:QT_ARCH" }
          Write-Host "Qt root: $qt_root"
          cmake -B build -S . `
            -DCMAKE_BUILD_TYPE=Release `
            -DCMAKE_PREFIX_PATH="$qt_root" `
            -DWINFSP_ROOT="C:/Program Files (x86)/WinFsp"

      - name: Build
        shell: pwsh
        run: cmake --build build --config Release --parallel

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: webdav2localdisk-x64-Release
          path: |
            build/Release/webdav2localdisk.exe
            build/Release/*.dll
          if-no-files-found: error
